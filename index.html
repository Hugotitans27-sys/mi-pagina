<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#f6ecff,#dcbcff,#b78ae5);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

overflow:hidden;

}

.card{

width:360px;

background:white;

padding:35px;

border-radius:30px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.15);

animation:fade 1s;

}

.logo{

width:150px;

height:150px;

border-radius:50%;

object-fit:cover;

border:5px solid #c69af3;

margin-bottom:20px;

}

h1{

font-family:'Cinzel',serif;

color:#8a5fd3;

margin-bottom:10px;

}

.frase{

font-style:italic;

color:#666;

margin-bottom:30px;

}

.btn{

display:block;

text-decoration:none;

background:#9b6ce3;

color:white;

padding:15px;

margin:12px 0;

border-radius:50px;

transition:.3s;

font-weight:600;

}

.btn:hover{

background:#7c47d3;

transform:scale(1.05);

}

.extra{

background:#e8d8ff;

color:#6b42aa;

}

footer{

margin-top:30px;

font-size:13px;

color:#777;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card">
